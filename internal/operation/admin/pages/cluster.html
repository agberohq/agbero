<div class="page active"><div class=config-header><h2>Cluster</h2><button class="btn primary" id=addClusterRouteBtn>Broadcast Route</button></div><div class=config-metrics-grid id=clusterMetricsGrid></div><div class=detail-section id=clusterNodesSection style=display:none><div class=detail-title>Active Nodes</div><div id=clusterNodeCards style=display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px></div></div></div><script type=module>import{component,modal,listen,on}from"../lib/oja.full.esm.js";import{store}from"../js/store.js";import{fetchUptime,fmtNum}from"../js/api.js";function render(e){const s=document.getElementById("clusterMetricsGrid"),t=document.getElementById("clusterNodesSection"),o=document.getElementById("clusterNodeCards");if(!s||!o)return;if(!e?.enabled){s.innerHTML=`<div class="empty-state" style="grid-column:1/-1;">
                <span>Cluster mode is disabled</span>
                <span>Enable gossip in agbero.hcl to use clustering</span>
            </div>`,t&&(t.style.display="none");return}const n=e.members||[],i=e.metrics||{};if(s.innerHTML=`
            <div class="metric-card"><div class="metric-label">Active Nodes</div><div class="metric-value">${n.length}</div></div>
            <div class="metric-card"><div class="metric-label">Updates Received</div><div class="metric-value">${fmtNum(i.updates_received||0)}</div></div>
            <div class="metric-card"><div class="metric-label">Total Deletes</div><div class="metric-value">${fmtNum(i.deletes||0)}</div></div>
            <div class="metric-card"><div class="metric-label">Ignored Updates</div><div class="metric-value">${fmtNum(i.updates_ignored||0)}</div></div>`,t&&(t.style.display=n.length?"":"none"),!n.length){o.innerHTML="";return}o.innerHTML=n.map(e=>{const o=typeof e=="string"?e:e.name||e.addr||JSON.stringify(e),t=typeof e=="object"?e.addr||"":"",n=typeof e=="object"?e.role||"member":"member",i=n==="leader"||n==="primary",s=typeof e=="object"&&e.last_seen?new Date(e.last_seen).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}):null;return`<div class="config-detail-item" style="display:flex;flex-direction:column;gap:6px;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="dot ok"></span>
                    <span class="mono" style="font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o}</span>
                    ${i?'<span class="badge info" style="flex-shrink:0;">leader</span>':'<span class="badge" style="flex-shrink:0;">member</span>'}

                ${t?`<div style="font-size:11px;color:var(--text-mute);font-family:var(--font-mono);">${t}</div>`:""}
                ${s?`<div style="font-size:10px;color:var(--text-mute);">last seen ${s}</div>`:""}
            </div>`}).join("")}async function refresh(){const e=await fetchUptime();render(e?.cluster)}const unsub=listen("cluster:updated",({clusterStats:e})=>render(e));component.onMount(()=>{const e=store.get("hostsData");e&&render(e.cluster),on("#addClusterRouteBtn","click",()=>modal.open("clusterRouteModal")),refresh(),component.interval(refresh,1e4)}),component.onUnmount(()=>unsub())</script>
