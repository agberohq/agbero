<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Path}}</title>
    <!-- Use the same font stack as Admin UI -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode - Agbero Style */
            --bg: #ffffff;
            --fg: #1a1a1a;
            --text-main: #333333;
            --text-mute: #888888;
            --border: #eeeeee;

            --accent: #a855f7; /* Agbero Purple */
            --hover-bg: #f9fafb;
            --table-head-bg: #f9f9f9;
        }

        .dark-mode {
            /* Dark Mode - Agbero Style */
            --bg: #111111;
            --fg: #ffffff;
            --text-main: #e0e0e0;
            --text-mute: #666666;
            --border: #222222;

            --hover-bg: #1a1a1a;
            --table-head-bg: #161616;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            color: var(--text-main);
            background-color: var(--bg);
            margin: 0;
            padding: 40px;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--fg);
            margin: 0;
            font-family: monospace;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--accent);
        }

        .breadcrumb a {
            color: var(--text-mute);
        }
        .breadcrumb a:hover {
            color: var(--fg);
        }
        .breadcrumb span {
            color: var(--border);
            margin: 0 5px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-mute);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            border-color: var(--text-mute);
            color: var(--fg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            text-align: left;
            font-weight: 500;
            color: var(--text-mute);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background: var(--hover-bg);
        }

        /* Icons & Types */
        .icon {
            display: inline-block;
            width: 20px;
            text-align: center;
            margin-right: 8px;
            color: var(--text-mute);
        }

        .name-link {
            font-weight: 200;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .size {
            font-family: monospace;
            color: var(--text-mute);
        }

        .date {
            color: var(--text-mute);
            font-size: 0.8rem;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-mute);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            body { padding: 20px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="breadcrumb">
            {{range $i, $c := .Breadcrumb}}
            {{if $i}}<span>/</span>{{end}}
            <a href="{{$c.Href}}">{{$c.Name}}</a>
            {{end}}
        </h1>
        <button type="button" class="theme-toggle" onclick="toggleTheme()">◑ Theme</button>
    </header>

    <table>
        <thead>
        <tr>
            <th width="50%">Name</th>
            <th width="20%">Size</th>
            <th width="30%" class="hide-mobile">Modified</th>
        </tr>
        </thead>
        <tbody>
        {{if .ShowParent}}
        <tr>
            <td>
                <a href="../" class="name-link">
                    <span class="icon">⤴</span> Parent Directory
                </a>
            </td>
            <td></td>
            <td class="hide-mobile"></td>
        </tr>
        {{end}}

        {{range .Items}}
        <tr>
            <td>
                <a href="{{.URL}}{{if .IsDir}}/{{end}}" class="name-link">
                    <span class="icon">{{if .IsDir}}📁{{else}}📄{{end}}</span>
                    {{.Name}}
                </a>
            </td>
            <td class="size">{{.Size}}</td>
            <td class="date hide-mobile">{{.ModTime}}</td>
        </tr>
        {{end}}
        </tbody>
    </table>

    <footer>
        Served by <b>agbero</b> • {{.FileCount}} Items
    </footer>
</div>

<script>
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    (function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (saved === 'dark' || (!saved && prefDark)) {
            document.body.classList.add('dark-mode');
        }
    })();
</script>
</body>
</html>
