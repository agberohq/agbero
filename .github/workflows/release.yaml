name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build binaries
        run: |
          # Create dist directory
          mkdir -p dist

          # Determine version from tag or workflow input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          # Common ldflags - MUST match Makefile: internal/core/woos (not internal/version)
          LDFLAGS="-s -w -X github.com/agberohq/agbero/internal/core/woos.Version=$VERSION -X github.com/agberohq/agbero/internal/core/woos.Commit=$(git rev-parse --short HEAD) -X github.com/agberohq/agbero/internal/core/woos.Date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          # Create temporary build directory
          mkdir -p build

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero.exe ./cmd/agbero
          cd build && zip ../dist/agbero-windows-amd64.zip agbero.exe && cd ..
          rm build/agbero.exe

          # Windows arm64
          GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero.exe ./cmd/agbero
          cd build && zip ../dist/agbero-windows-arm64.zip agbero.exe && cd ..
          rm build/agbero.exe

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-linux-amd64.tar.gz agbero && cd ..
          rm build/agbero

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-linux-arm64.tar.gz agbero && cd ..
          rm build/agbero

          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-darwin-amd64.tar.gz agbero && cd ..
          rm build/agbero

          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -trimpath -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-darwin-arm64.tar.gz agbero && cd ..

          # Clean up
          rm -rf build

          # Generate checksums
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cd ..

      - name: Upload install script
        run: |
          mkdir -p dist
          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/agbero-linux-amd64.tar.gz
            dist/agbero-linux-arm64.tar.gz
            dist/agbero-darwin-amd64.tar.gz
            dist/agbero-darwin-arm64.tar.gz
            dist/agbero-windows-amd64.zip
            dist/agbero-windows-arm64.zip
            dist/checksums.txt
            dist/install.sh
          generate_release_notes: true
          draft: false
          prerelease: false