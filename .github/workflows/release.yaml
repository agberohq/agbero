name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Build binaries
        run: |
          # Create dist directory
          mkdir -p dist
          
          # Version from tag
          VERSION=${GITHUB_REF_NAME#v}
          
          # Common ldflags
          LDFLAGS="-s -w -X github.com/agberohq/agbero/internal/version.Version=$VERSION -X github.com/agberohq/agbero/internal/version.Commit=$(git rev-parse --short HEAD) -X github.com/agberohq/agbero/internal/version.Date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          
          # Create temporary build directory
          mkdir -p build
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/agbero.exe ./cmd/agbero
          cd build && zip ../dist/agbero-windows-amd64.zip agbero.exe && cd ..
          rm build/agbero.exe
          
          GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/agbero.exe ./cmd/agbero
          cd build && zip ../dist/agbero-windows-arm64.zip agbero.exe && cd ..
          rm build/agbero.exe
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-linux-amd64.tar.gz agbero && cd ..
          rm build/agbero
          
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-linux-arm64.tar.gz agbero && cd ..
          rm build/agbero
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-darwin-amd64.tar.gz agbero && cd ..
          rm build/agbero
          
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/agbero ./cmd/agbero
          cd build && tar -czf ../dist/agbero-darwin-arm64.tar.gz agbero && cd ..
          
          # Clean up
          rm -rf build
          
          # Generate checksums
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            dist/agbero-linux-amd64.tar.gz
            dist/agbero-linux-arm64.tar.gz
            dist/agbero-darwin-amd64.tar.gz
            dist/agbero-darwin-arm64.tar.gz
            dist/agbero-windows-amd64.zip
            dist/agbero-windows-arm64.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
